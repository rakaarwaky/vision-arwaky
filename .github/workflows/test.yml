name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1 tesseract-ocr ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --no-dev
        
      - name: Install additional deps (not in pyproject.toml)
        run: uv pip install opencv-contrib-python-headless pytesseract

      - name: Generate test fixtures
        run: |
          uv run python3 -c "
          import cv2, numpy as np, os
          os.makedirs('tests/fixtures', exist_ok=True)
          img = np.zeros((200, 200, 3), dtype=np.uint8)
          cv2.rectangle(img, (30, 30), (170, 170), (255, 255, 255), -1)
          cv2.putText(img, 'TEST', (50, 120), cv2.FONT_HERSHEY_SIMPLEX, 1.5, (0, 255, 0), 3)
          cv2.imwrite('tests/fixtures/test.jpeg', img)
          out = cv2.VideoWriter('tests/fixtures/test.mp4',
                                cv2.VideoWriter_fourcc(*'mp4v'), 10, (100, 100))
          for i in range(10):
              frame = np.ones((100, 100, 3), dtype=np.uint8) * i * 25
              out.write(frame)
          out.release()
          "

      - name: Run tests only (original test suite)
        run: uv run pytest tests/test_vision.py -v
