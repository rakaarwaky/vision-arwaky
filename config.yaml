# config.yaml - Vision MCP Server configuration
backend: "native"  # "native" (llama-cpp-python) or "external" (LM Studio / Ollama / OpenAI)

# Native (Direct Python In-Process) Execution
native:
  model_path: "models/MiniCPM-V-4_6-Q8_0.gguf"
  mmproj_path: "models/mmproj-model-f16"
  n_ctx: 2048
  n_threads: 4
  n_gpu_layers: -1  # Set to -1 to offload all layers to GPU (CUDA/Metal), or 0 for CPU-only

# External API Execution (Fallback / Original Mode)
external:
  url: "http://127.0.0.1:1234/v1"
  model: "MiniCPM-V-4_6-Q8_0"
  api_key: "lm-studio"
